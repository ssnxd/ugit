name: release

# Publish desktop bundles + standalone CLI binaries to GitHub Releases, and the
# updater manifest (latest.json) the app polls. Triggered by pushing a version
# tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            rust_target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            rust_target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Stage CLI sidecar
        shell: bash
        run: ./scripts/stage-sidecar.sh ${{ matrix.rust_target }}

      - name: Build & publish app (bundles + updater artifacts + latest.json)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ugit ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install ugit.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}

      - name: Upload standalone CLI binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="src-tauri/binaries/ugit-${{ matrix.rust_target }}"
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          gh release upload "${{ github.ref_name }}" "$BIN" --clobber
